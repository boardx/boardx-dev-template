name = "coord-service"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Phase 1 (local-only): placeholder database_id, only used with `--local` where
# wrangler never talks to a real Cloudflare account. Phase 2 replaces this with
# a real `wrangler d1 create coord-service-staging` id and adds [env.staging] /
# [env.production] blocks with their own real ids — see ADR-005-adjacent rollout
# plan in phases/phase-01-foundation/adr/ (coord-service migration, not yet ADR'd).
[[d1_databases]]
binding = "DB"
database_name = "coord_service_db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "./migrations"

# Both the stale-claim sweep and the one-way GitHub projector run off the same
# schedule (see src/index.ts `scheduled()` — both are cheap, idempotent, and at
# this scale there's no reason to give them separate cron strings).
[triggers]
crons = ["*/5 * * * *"]
