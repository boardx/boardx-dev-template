# Cloudflare Pages project config for the standalone coordination dashboard.
#
# This is a Pages project (static assets in ./public + Pages Functions in
# ./functions), NOT a Worker. It is deployed independently of apps/web and of
# coord-service — its own URL, its own lifecycle.
#
#   pnpm --filter @repo/coord-dashboard deploy
#     → wrangler pages deploy public --project-name coord-dashboard
#
# COORD_SERVICE_URL is read by functions/api/status.ts. It is optional: the
# function falls back to the staging URL below when unset. To point the
# dashboard at a different coord-service, set it as a Pages project variable
# (Cloudflare dashboard → Pages → coord-dashboard → Settings → Variables) or via
#   wrangler pages deploy public --project-name coord-dashboard \
#     --var COORD_SERVICE_URL:https://coord-service-staging.boardx.workers.dev
name = "coord-dashboard"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"

[vars]
COORD_SERVICE_URL = "https://coord-service-staging.boardx.workers.dev"
