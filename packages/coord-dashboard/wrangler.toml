# Cloudflare Pages project config for the standalone coordination dashboard.
#
# This is a Pages project (static assets in ./public + Pages Functions in
# ./functions), NOT a Worker. It is deployed independently of apps/web and of
# coord-gateway — its own URL, its own lifecycle.
#
#   pnpm --filter @repo/coord-dashboard deploy
#     → wrangler pages deploy public --project-name coord-dashboard
#
# 2026-07-18 cutover (p29-F10 stage-2, ADR-017): the read plane moved from the
# retired coord-service public /status to coord-gateway's authenticated
# /claims + /events. functions/api/status.ts reads:
#   COORD_GATEWAY_URL / COORD_REPO   non-sensitive, declared below
#   COORD_API_TOKEN                  gateway bearer — encrypted Pages secret:
#     wrangler pages secret put COORD_API_TOKEN --project-name coord-dashboard
# Until all three are present the dashboard renders an honest "not configured"
# empty state. Env changes must be atomic with deploys (mod-devportal incident).
name = "coord-dashboard"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"

[vars]
COORD_GATEWAY_URL = "https://coord-gateway.boardx.workers.dev"
COORD_REPO = "boardx/boardx-dev-template"
