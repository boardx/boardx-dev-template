document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:12.5px;color:#505050;margin-top:10px\">A few clarifying questions:<\u002Fdiv>\n                          <div style=\"font-size:13px;margin-top:8px;display:flex;flex-direction:column;gap:7px\">\n                            <sc-for list=\"{{ m.clarifyQs }}\" as=\"q\" hint-placeholder-count=\"3\"><div style=\"display:flex;gap:8px\"><span style=\"color:#a0a0a0\">•<\u002Fspan><span>{{ q }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n                          <\u002Fdiv>\n                          <div onclick=\"{{ m.onApprove }}\" style=\"margin-top:14px;display:inline-flex;align-items:center;background:#000;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer\" style-hover=\"background:#282828\">Approve &amp; plan →<\u002Fdiv>\n                        <\u002Fsc-if>\n                        <!-- plan -->\n                        <sc-if value=\"{{ m.phasePlan }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"font-size:12.5px;color:#505050;margin-top:10px\">Proposed plan<\u002Fdiv>\n                          <sc-for list=\"{{ m.planStages }}\" as=\"p\" hint-placeholder-count=\"3\"><div style=\"display:flex;gap:9px;align-items:center;margin-top:9px\"><div style=\"width:20px;height:20px;border-radius:6px;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600\">{{ p.n }}<\u002Fdiv><div style=\"font-size:13px\">{{ p.t }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for>\n                          <div onclick=\"{{ m.onRun }}\" style=\"margin-top:14px;display:inline-flex;align-items:center;background:#000;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer\" style-hover=\"background:#282828\">Run research<\u002Fdiv>\n                        <\u002Fsc-if>\n                        <!-- running / report timeline -->\n                        <sc-if value=\"{{ m.phaseRunning }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"margin-top:12px py }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">⧉ Copy<\u002Fspan><span onclick=\"{{ m.onRegen }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">↻ Regenerate<\u002Fspan><span onclick=\"{{ m.onUp }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">👍<\u002Fspan><span onclick=\"{{ m.onDown }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">👎<\u002Fspan><span onclick=\"{{ sendToBoard }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">→ Send to board<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                    <sc-if value=\"{{ m.showUserFooter }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;gap:14px;margin-top:7px;justify-content:flex-end;color:#a0a0a0;font-size:12px\"><span onclick=\"{{ m.onEdit }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">✎ Edit<\u002Fspan><span onclick=\"{{ m.onDelete }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">🗑 Delete<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ sending }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:11px;align-items:flex-start\"><div style=\"width:28px;height:28px;border-radius:8px;background:#000;color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700\">AI<\u002Fdiv><div style=\"display:flex;gap:4px;padding:10px 2px\"><div style=\"width:7px;height:7px;border-radius:50%;background:#a0a0a0;animation:bxblink 1s infinite\"><\u002Fdiv><div style=\"width:7px;height:7px;border-radius:50%;background:#a0a0a0;animation:bxblink 1s infinite .2s\"><\u002Fdiv><div style=\"width:7px;height:7px;border-radius:50%;background:#a0a0a0;animation:bxblink 1s infinite .4s\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- composer -->\n          <div style=\"flex:none;padding:0 24px 22px\">\n            <div style=\"max-width:700px;margin:0 auto;border:1px solid {{ composerBorder }};border-radius:14px;padding:12px 14px;position:relative\">\n              <sc-if value=\"{{ mentionOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;left:12px;bottom:calc(100% + 8px);width:240px;background:#fff;border:1px solid #e0e0e0;border-radius:11px;box-shadow:0 12px 32px rgba(0,0,0,.16);padding:6px;z-index:20\">\n                  <div style=\"font-size:10px;color:#a0a0a0;padding:5px 9px;font-weight:600\">{{ mentionHeader }}<\u002Fdiv>\n                  <sc-for list=\"{{ mentionItems }}\" as=\"mi\" hint-placeholder-count=\"3\"><div onclick=\"{{ mi.onClick }}\" style=\"{{ mi.style }}\"><span style=\"width:22px;height:22px;border-radius:6px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px\">{{ mi.icon }}<\u002Fspan><span style=\"flex:1\">{{ mi.name }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ hasAttachments }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px\">\n                  <sc-for list=\"{{ attachments }}\" as=\"at\" hint-placeholder-count=\"1\"><div style=\"display:flex;align-items:center;gap:7px;background:#f0f0f0;border-radius:8px;padding:6px 9px;font-size:12px\">{{ at.icon }} <span>{{ at.name }}<\u002Fspan><span onclick=\"{{ at.onRemove }}\" style=\"cursor:pointer;color:#a0a0a0\" style-hover=\"color:#000\">✕<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ recording }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#f0f0f0;border-radius:9px;padding:8px 11px\"><div style=\"width:9px;height:9px;border-radius:50%;background:#000;animation:bxblink 1s infinite\"><\u002Fdiv><span style=\"font-size:12px;color:#383838\">Recording… 0:06<\u002Fspan><div style=\"flex:1;display:flex;gap:2px;align-items:center\">▁▃▅▇▅▃▁▃▅▇▅▃▁<\u002Fdiv><span onclick=\"{{ stopRecording }}\" style=\"font-size:12px;cursor:pointer;color:#000;font-weight:600\">Stop<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-if>\n              <input value=\"{{ draft }}\" oninput=\"{{ setDraft }}\" onkeydown=\"{{ inputKey }}\" placeholder=\"{{ composerPlaceholder }}\" style=\"width:100%;border:none;font-size:14px;background:transparent\" style-focus=\"outline:none\">\n              <div style=\"display:flex;align-items:center;gap:13px;margin-top:10px;color:#707070;font-size:15px\">\n                <span onclick=\"{{ attachFile }}\" title=\"Attach file\" style=\"cursor:pointer\" style-hover=\"color:#000\">📎<\u002Fspan>\n                <span onclick=\"{{ attachImage }}\" title=\"Add image\" style=\"cursor:pointer\" style-hover=\"color:#000\">🖼<\u002Fspan>\n                <span onclick=\"{{ startRecording }}\" title=\"Voice\" style=\"cursor:pointer\" style-hover=\"color:#000\">🎙<\u002Fspan>\n                <div style=\"width:1px;height:16px;background:#e0e0e0\"><\u002Fdiv>\n                <span onclick=\"{{ openMentionAgent }}\" title=\"Mention an expert\" style=\"cursor:pointer;font-size:12px;font-weight:600;color:#383838\" style-hover=\"color:#000\">@ Expert<\u002Fspan>\n                <span onclick=\"{{ openMentionSkill }}\" title=\"Use a skill\" style=\"cursor:pointer;font-size:12px;font-weight:600;color:#383838\" style-hover=\"color:#000\"># Skill<\u002Fspan>\n                <span onclick=\"{{ toggleResearch }}\" style=\"{{ researchPillStyle }}\">✦ Deep Research<\u002Fspan>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <div onclick=\"{{ send }}\" style=\"width:32px;height:32px;border-radius:9px;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px\" style-hover=\"background:#282828\">↑<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- report panel -->\n          <sc-if value=\"{{ reportOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;top:0;right:0;bottom:0;width:380px;background:#fff;border-left:1px solid #e0e0e0;box-shadow:-8px 0 28px rgba(0,0,0,.08);display:flex;flex-direction:column;z-index:25\">\n              <div style=\"height:54px;flex:none;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;padding:0 18px;gap:10px\"><span style=\"font-size:11px;font-weight:700;background:#000;color:#fff;border-radius:5px;padding:2px 7px\">REPORT<\u002Fspan><div style=\"flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ reportTitle }}<\u002Fdiv><div onclick=\"{{ closeReport }}\" style=\"cursor:pointer;color:#707070;font-size:16px\" style-hover=\"color:#000\">✕<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;overflow:auto;padding:20px 18px;font-size:13.5px;line-height:1.65;color:#282828\">\n                <!-- market report -->\n                <sc-if value=\"{{ reportMarket }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"font-weight:700;font-size:15px;margin-bottom:8px\">Executive summary<\u002Fdiv>\n                  <div>The market is consolidating around AI-native collaboration. Pricing splits into freemium and seat-based tiers; the strongest differentiation is real-time AI on an infinite canvas.<\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:14px;margin:18px 0 6px\">Key findings<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:8px\"><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>3 of 5 competitors lack inline AI generation.<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>Teams value live transcription and summaries.<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>Onboarding friction is the top churn driver.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:14px;margin:18px 0 6px\">Recommendation<\u002Fdiv>\n                  <div>Lead with AI-on-canvas in positioning; bundle transcription into the team tier; cut onboarding to under 3 steps.<\u002Fdiv>\n                <\u002Fsc-if>\n                <!-- user research report -->\n                <sc-if value=\"{{ reportUser }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-weight:700;font-size:15px;margin-bottom:8px\">Summary<\u002Fdiv>\n                  <div>From 18 interviews, three personas emerged. The sharpest, most repeated pain is slow setup and fragmented tools blocking the first \"aha\" moment.<\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:14px;margin:18px 0 8px\">Personas<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:8px\">\n                    <div style=\"border:1px solid #e0e0e0;border-radius:9px;padding:10px\"><div style=\"font-size:13px;font-weight:600\">The Facilitator<\u002Fdiv><div style=\"font-size:12px;color:#707070\">Runs workshops; wants speed and templates.<\u002Fdiv><\u002Fdiv>\n                    <div style=\"border:1px solid #e0e0e0;border-radius:9px;padding:10px\"><div style=\"font-size:13px;font-weight:600\">The Builder<\u002Fdiv><div style=\"font-size:12px;color:#707070\">Turns ideas into specs; wants AI on canvas.<\u002Fdiv><\u002Fdiv>\n                    <div style=\"border:1px solid #e0e0e0;border-radius:9px;padding:10px\"><div style=\"font-size:13px;font-weight:600\">The Reviewer<\u002Fdiv><div style=\"font-size:12px;color:#707070\">Async feedback; wants comments + summaries.<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:14px;margin:18px 0 6px\">Top pain points<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:8px\"><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>\"Setup took 20 minutes before I could start.\" (12/18)<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>\"I jump between 4 tools for one meeting.\" (9/18)<\u002Fspan><\u002Fdiv><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>\"Hard to find an old board later.\" (7/18)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:14px;margin:18px 0 6px\">Opportunities<\u002Fdiv>\n                  <div>Cut setup to under 3 steps, unify chat + canvas + files, and add semantic board search.<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display:flex;gap:14px;margin-top:20px;color:#a0a0a0;font-size:12px\"><span onclick=\"{{ toast }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">⧉ Copy<\u002Fspan><span onclick=\"{{ sendToBoard }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">→ Send to board<\u002Fspan><span onclick=\"{{ toast }}\" style=\"cursor:pointer\" style-hover=\"color:#000\">↓ Export PDF<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STORE -->\n      <sc-if value=\"{{ rStore }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;display:flex;overflow:hidden\">\n        <!-- store submenu -->\n        <div style=\"width:200px;flex:none;border-right:1px solid #e0e0e0;padding:18px 12px;overflow:auto\">\n          <div style=\"font-size:15px;font-weight:700;padding:0 8px 12px\">AI Store<\u002Fdiv>\n          <sc-for list=\"{{ storeNavItems }}\" as=\"g\" hint-placeholder-count=\"2\">\n            <div style=\"font-size:10px;color:#a0a0a0;font-weight:600;letter-spacing:.04em;padding:12px 8px 6px\">{{ g.group }}<\u002Fdiv>\n            <sc-for list=\"{{ g.items }}\" as=\"n\" hint-placeholder-count=\"2\"><div onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\"><span style=\"width:18px;text-align:center\">{{ n.icon }}<\u002Fspan><span>{{ n.name }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <!-- store content -->\n        <div style=\"flex:1;overflow:auto;padding:28px 32px\">\n          <div style=\"display:flex;align-items:center;gap:12px\"><div style=\"font-size:20px;font-weight:700\">{{ storeTitle }}<\u002Fdiv><div style=\"font-size:13px;color:#a0a0a0\">{{ storeCount }} results<\u002Fdiv><div style=\"flex:1\"><\u002Fdiv><div onclick=\"{{ openStoreCreate }}\" style=\"height:34px;background:#000;color:#fff;border-radius:8px;padding:0 14px;display:flex;align-items:center;font-size:13px;font-weight:500;cursor:pointer\" style-hover=\"background:#282828\">+ Create<\u002Fdiv><\u002Fdiv>\n          <div style=\"margin-top:16px;display:flex;align-items:center;gap:9px;border:1px solid #e0e0e0;border-radius:10px;padding:11px 14px\" style-focus=\"border-color:#000\"><span style=\"color:#a0a0a0\">⌕<\u002Fspan><input value=\"{{ storeQuery }}\" oninput=\"{{ setStoreQuery }}\" placeholder=\"Search by name or description…\" style=\"flex:1;border:none;font-size:14px;background:transparent\" style-focus=\"outline:none\"><\u002Fdiv>\n          <div style=\"display:flex;gap:9px;margin-top:14px;flex-wrap:wrap\">\n            <sc-for list=\"{{ storeTypeTabs }}\" as=\"tt\" hint-placeholder-count=\"4\"><div onclick=\"{{ tt.onClick }}\" style=\"{{ tt.style }}\">{{ tt.name }}<\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px;flex-wrap:wrap\">\n            <span style=\"font-size:11px;color:#a0a0a0\">Tags:<\u002Fspan>\n            <sc-for list=\"{{ storeTags }}\" as=\"tg\" hint-placeholder-count=\"4\"><div onclick=\"{{ tg.onClick }}\" style=\"{{ tg.style }}\">{{ tg.name }}<\u002Fdiv><\u002Fsc-for>\n            <sc-if value=\"{{ storeFiltersActive }}\" hint-placeholder-val=\"{{ false }}\"><div onclick=\"{{ clearStoreFilters }}\" style=\"font-size:11px;color:#000;font-weight:600;cursor:pointer;text-decoration:underline\">Clear all<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:16px;margin-top:20px\">\n            <sc-for list=\"{{ storeCards }}\" as=\"it\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ it.onOpen }}\" style=\"position:relative;border:1px solid #e0e0e0;border-radius:12px;padding:16px;cursor:pointer\" style-hover=\"border-color:#c8c8c8;box-shadow:0 2px 12px rgba(0,0,0,.06)\">\n                <sc-if value=\"{{ it.featured }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;background:#181818;color:#fff;border-radius:5px;padding:2px 7px\">★ FEATURED<\u002Fdiv><\u002Fsc-if>\n                <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:38px;height:38px;border-radius:10px;background:{{ it.fill }};display:flex;align-items:center;justify-content:center;font-size:17px\">{{ it.icon }}<\u002Fdiv><div><div style=\"font-size:14px;font-weight:600\">{{ it.name }}<\u002Fdiv><div style=\"font-size:11px;color:#a0a0a0\">{{ it.author }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#707070;margin-top:11px;line-height:1.5;min-height:36px\">{{ it.desc }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:12px\"><div style=\"font-size:11px;color:#a0a0a0\">♡ {{ it.likes }} · 👁 {{ it.views }}<\u002Fdiv><div onclick=\"{{ it.onCta }}\" style=\"{{ it.ctaStyle }}\">{{ it.cta }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ storeEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;padding:54px 0;color:#a0a0a0\"><div style=\"font-size:30px\">◳<\u002Fdiv><div style=\"font-size:14px;font-weight:600;color:#383838;margin-top:10px\">No items here yet<\u002Fdiv><div style=\"font-size:13px;margin-top:4px\">Try a different type, tag, or search — or create one.<\u002Fdiv><div onclick=\"{{ openStoreCreate }}\" style=\"display:inline-flex;margin-top:16px;font-size:13px;font-weight:500;background:#000;color:#fff;border-radius:8px;padding:9px 16px;cursor:pointer\" style-hover=\"background:#282828\">+ Create item<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SURVEYS -->\n      <sc-if value=\"{{ rSurveys }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;overflow:auto\">\n\n        <!-- LIST -->\n        <sc-if value=\"{{ surveyList }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:32px 36px\">\n          <div style=\"display:flex;align-items:center;gap:12px\"><div style=\"font-size:22px;font-weight:700\">Surveys<\u002Fdiv><div style=\"flex:1\"><\u002Fdiv><div onclick=\"{{ newSurvey }}\" style=\"height:34px;background:#000;color:#fff;border-radius:8px;padding:0 14px;display:flex;align-items:center;font-size:13px;font-weight:500;cursor:pointer\" style-hover=\"background:#282828\">+ New survey<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:24px;border-bottom:1px solid #e0e0e0;margin-top:20px\">\n            <sc-for list=\"{{ surveyTabs }}\" as=\"sv\" hint-placeholder-count=\"3\"><div onclick=\"{{ sv.onClick }}\" style=\"{{ sv.style }}\">{{ sv.name }}<\u002Fdiv><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:20px;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden\">\n            <div style=\"display:flex;padding:11px 18px;background:#fafafa;border-bottom:1px solid #e0e0e0;font-size:11px;color:#707070;font-weight:600\"><div style=\"flex:2.4\">Survey<\u002Fdiv><div style=\"flex:1\">Scope<\u002Fdiv><div style=\"flex:1\">Responses<\u002Fdiv><div style=\"flex:1\">Status<\u002Fdiv><div style=\"width:80px\"><\u002Fdiv><\u002Fdiv>\n            <sc-for list=\"{{ surveys }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid #f0f0f0\" style-hover=\"background:#fafafa\">\n                <div style=\"flex:2.4\"><div style=\"font-size:13.5px;font-weight:600\">{{ s.name }}<\u002Fdiv><div style=\"font-size:11px;color:#a0a0a0;margin-top:2px\">{{ s.updated }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1\"><span style=\"font-size:11px;background:#f0f0f0;border-radius:5px;padding:2px 8px\">{{ s.scope }}<\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;font-size:13px;color:#383838\">{{ s.responses }}<\u002Fdiv>\n                <div style=\"flex:1\"><span style=\"{{ s.statusStyle }}\">{{ s.status }}<\u002Fspan><\u002Fdiv>\n                <div style=\"width:80px;display:flex;gap:10px;align-items:center\"><span onclick=\"{{ s.onView }}\" style=\"font-size:12px;font-weight:600;cursor:pointer;color:#000\" style-hover=\"text-decoration:underline\">View<\u002Fspan><span onclick=\"{{ s.onMenu }}\" style=\"cursor:pointer;color:#a0a0a0;font-size:14px\" style-hover=\"color:#000\">⋯<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- EDITOR -->\n        <sc-if value=\"{{ surveyEditor }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;height:100%\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px;padding:0 24px\">\n            <div onclick=\"{{ goSurveyList }}\" style=\"cursor:pointer;color:#707070;font-size:13px\" style-hover=\"color:#000\">‹ Surveys<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:600;flex:1\">Survey editor<\u002Fdiv>\n            <div onclick=\"{{ previewSurvey }}\" style=\"font-size:13px;border:1px solid #e0e0e0;border-radius:8px;padding:7px 14px;cursor:pointer\" style-hover=\"background:#f8f8f8\">Preview<\u002Fdiv>\n            <div onclick=\"{{ saveSurvey }}\" style=\"font-size:13px;font-weight:500;background:#000;color:#fff;border-radius:8px;padding:8px 16px;cursor:pointer\" style-hover=\"background:#282828\">Create survey<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow:auto;padding:28px 24px\">\n            <div style=\"max-width:680px;margin:0 auto\">\n              <input value=\"{{ surveyTitle }}\" oninput=\"{{ editSurveyTitle }}\" style=\"width:100%;border:none;font-size:24px;font-weight:700;padding:4px 0\" style-focus=\"outline:none\">\n              <textarea value=\"{{ surveyDesc }}\" oninput=\"{{ editSurveyDesc }}\" placeholder=\"Add a description…\" style=\"width:100%;border:none;font-size:14px;color:#505050;padding:4px 0;resize:none;font-family:inherit;height:30px\" style-focus=\"outline:none\"><\u002Ftextarea>\n              <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:18px\">\n                <sc-for list=\"{{ editorQuestions }}\" as=\"q\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid #e0e0e0;border-radius:12px;padding:16px\" style-hover=\"border-color:#c8c8c8\">\n                    <div style=\"display:flex;align-items:center;gap:8px\">\n                      <span style=\"font-size:11px;font-weight:700;color:#a0a0a0\">Q{{ q.idx }}<\u002Fspan>\n                      <span style=\"font-size:11px;color:#707070;background:#f0f0f0;border-radius:5px;padding:2px 8px\">{{ q.typeLabel }}<\u002Fspan>\n                      <div style=\"flex:1\"><\u002Fdiv>\n                      <div onclick=\"{{ q.onReq }}\" style=\"{{ q.reqStyle }}\">Required<\u002Fdiv>\n                      <span onclick=\"{{ q.onUp }}\" style=\"cursor:pointer;color:#a0a0a0;font-size:14px\" style-hover=\"color:#000\">↑<\u002Fspan>\n 12px;resize:none;font-family:inherit\" style-focus=\"border-color:#000;outline:none\"><\u002Ftextarea>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ submitAnswer }}\" style=\"margin-top:26px;height:44px;background:#000;color:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:#282828\">Submit<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- RESULTS / REPORT -->\n        <sc-if value=\"{{ surveyResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;height:100%\">\n          <div style=\"flex:none;border-bottom:1px solid #e0e0e0;padding:20px 28px 0\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div onclick=\"{{ goSurveyList }}\" style=\"cursor:pointer;color:#707070;font-size:13px\" style-hover=\"color:#000\">‹ Surveys<\u002Fdiv>\n              <div style=\"font-size:18px;font-weight:700\">Q2 Customer Satisfaction<\u002Fdiv>\n              <span style=\"font-size:11px;background:#f0f0f0;border-radius:5px;padding:2px 8px;color:#505050\">248 responses<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:26px;margin-top:18px\">\n              <div onclick=\"{{ goResSummary }}\" style=\"{{ tabSummaryStyle }}\">Summary<\u002Fdiv>\n              <div onclick=\"{{ goResIndividual }}\" style=\"{{ tabIndividualStyle }}\">Individual<\u002Fdiv>\n              <div onclick=\"{{ goResReport }}\" style=\"{{ tabReportStyle }}\">Report<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow:auto;padding:26px 28px\">\n            <!-- summary -->\n            <sc-if value=\"{{ resultsSummary }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:680px;display:flex;flex-direction:column;gap:18px\">\n                <sc-for list=\"{{ summaryQ }}\" as=\"sq\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid #e0e0e0;border-radius:12px;padding:18px\">\n                    <div style=\"font-size:14px;font-weight:600\">{{ sq.title }}<\u002Fdiv>\n                    <sc-if value=\"{{ sq.isBars }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n                        <sc-for list=\"{{ sq.barRows }}\" as=\"b\" hint-placeholder-count=\"3\"><div style=\"display:flex;align-items:center;gap:11px\"><div style=\"width:110px;font-size:12px;color:#505050\">{{ b.label }}<\u002Fdiv><div style=\"flex:1;height:18px;background:#f0f0f0;border-radius:5px;overflow:hidden\"><div style=\"height:100%;background:#181818;width:{{ b.pct }}%\"><\u002Fdiv><\u002Fdiv><div style=\"width:38px;font-size:12px;color:#707070;text-align:right\">{{ b.pct }}%<\u002Fdiv><\u002Fdiv><\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ sq.isStat }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:12px\"><span style=\"font-size:34px;font-weight:700\">{{ sq.stat }}<\u002Fspan><span style=\"font-size:13px;color:#a0a0a0;margin-left:8px\">{{ sq.sub }}<\u002Fspan><\u002Fdiv><\u002Fsc-if>\n                    <sc-if value=\"{{ sq.isText }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;flex-direction:column;gap:7px;margin-top:12px\"><sc-for list=\"{{ sq.sampleRows }}\" as=\"t\" hint-placeholder-count=\"3\"><div style=\"font-size:13px;color:#505050;background:#fafafa;border-radius:8px;padding:9px 12px\">{{ t.q }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <!-- individual -->\n            <sc-if value=\"{{ resultsIndividual }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;max-width:780px\">\n                <div style=\"display:flex;padding:11px 16px;background:#fafafa;border-bottom:1px solid #e0e0e0;font-size:11px;color:#707070;font-weight:600\"><div style=\"flex:1.2\">Respondent<\u002Fdiv><div style=\"flex:1.2\">Satisfaction<\u002Fdiv><div style=\"width:70px\">Rating<\u002Fdiv><div style=\"flex:1.6\">Comment<\u002Fdiv><\u002Fdiv>\n                <sc-for list=\"{{ individualRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px\" style-hover=\"background:#fafafa\"><div style=\"flex:1.2\"><div style=\"font-weight:500\">{{ r.who }}<\u002Fdiv><div style=\"font-size:11px;color:#a0a0a0\">{{ r.when }}<\u002Fdiv><\u002Fdiv><div style=\"flex:1.2;color:#383838\">{{ r.a1 }}<\u002Fdiv><div style=\"width:70px;color:#383838\">{{ r.a2 }}<\u002Fdiv><div style=\"flex:1.6;color:#707070\">{{ r.a3 }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <!-- report -->\n            <sc-if value=\"{{ resultsReport }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ reportNotGen }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"text-align:center;padding:54px 0;color:#a0a0a0;max-width:680px\">\n                  <div style=\"font-size:30px\">📄<\u002Fdiv>\n                  <div style=\"font-size:15px;font-weight:600;color:#383838;margin-top:12px\">No report generated yet<\u002Fdiv>\n                  <div style=\"font-size:13px;margin-top:5px\">Generate an AI analysis from the 248 collected responses.<\u002Fdiv>\n                  <div onclick=\"{{ generateReport }}\" style=\"display:inline-flex;margin-top:18px;font-size:13px;font-weight:500;background:#000;color:#fff;border-radius:9px;padding:11px 18px;cursor:pointer\" style-hover=\"background:#282828\">✦ Generate report<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ reportGen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"max-width:680px\">\n                  <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"font-size:16px;font-weight:700;flex:1\">Analysis report<\u002Fdiv><div onclick=\"{{ generateReport }}\" style=\"font-size:12px;border:1px solid #e0e0e0;border-radius:7px;padding:6px 11px;cursor:pointer\" style-hover=\"background:#f8f8f8\">↻ Regenerate<\u002Fdiv><div onclick=\"{{ toast }}\" style=\"font-size:12px;border:1px solid #e0e0e0;border-radius:7px;padding:6px 11px;cursor:pointer\" style-hover=\"background:#f8f8f8\">↓ PDF<\u002Fdiv><div onclick=\"{{ toast }}\" style=\"font-size:12px;border:1px solid #e0e0e0;border-radius:7px;padding:6px 11px;cursor:pointer\" style-hover=\"background:#f8f8f8\">↓ Word<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:11px;color:#a0a0a0;margin-top:6px\">Auto-generated from current responses — for team analysis only.<\u002Fdiv>\n                  <div style=\"border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-top:14px;line-height:1.65;font-size:13.5px;color:#282828\">\n                    <div style=\"font-weight:700;font-size:15px\">Sample overview<\u002Fdiv>\n                    <div style=\"margin-top:5px\">248 responses collected over 14 days; 92% completion rate.<\u002Fdiv>\n                    <div style=\"font-weight:700;font-size:14px;margin-top:16px\">Core insights<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:7px;margin-top:7px\"><div style=\"display:flex;gap:8px\"><span>•<\u002Fspan><span>88% are satisfied or very satisfied — up 6pts from Q1.<\u002Fspan><\u002Fdiv><div style=\"
