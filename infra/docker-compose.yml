# infra/docker-compose.yml — 本地依赖即代码（CAP-DATA / CAP-WORKFLOW）
# 起：docker compose -f infra/docker-compose.yml up -d
# 注：先用 pgvector 镜像（向量检索就绪）；Apache AGE 等图特性 feature 来了再换镜像。

networks:
  infra:
    driver: bridge
    ipam:
      config:
        - subnet: "172.61.0.0/24"

services:
  postgres:
    image: pgvector/pgvector:pg16
    networks:
      - infra
    environment:
      POSTGRES_USER: boardx
      POSTGRES_PASSWORD: boardx
      POSTGRES_DB: boardx
    # 主机端口可用 PG_PORT 覆盖（避开本机已占用的 5432），容器内仍 5432
    ports:
      - "${PG_PORT:-57000}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardx"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    networks:
      - infra
    # 主机端口可用 REDIS_PORT 覆盖（避开本机已占用的 6379），容器内仍 6379
    ports:
      - "${REDIS_PORT:-57001}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # CAP-FILE（p10 知识库）：S3 兼容对象存储，本地用 MinIO。
  # 控制台: http://localhost:${MINIO_CONSOLE_PORT:-9091}（账号见下方环境变量）
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    command: server /data --console-address ":9001"
    networks:
      - infra
    environment:
      MINIO_ROOT_USER: boardx
      MINIO_ROOT_PASSWORD: boardx123
    ports:
      - "${MINIO_PORT:-57002}:9000"
      - "${MINIO_CONSOLE_PORT:-57003}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10
