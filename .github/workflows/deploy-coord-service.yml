# deploy-coord-service.yml — 协调权威 CD：main 上 coord-service 有新代码 →
# 自动 apply 迁移 + 部署 Worker（coord-service-staging，ADR-014 起是全队协调权威）。
#
# 为什么这条 CD 是刚需（andon #272 / #290 的根因）：coord-service 此前只有手动
# `wrangler deploy`。两个 feature 分支各自手动部署会 last-write-wins 互相覆盖——
# #629 的部署从旧 checkout 覆盖掉了 #614 的 tasks 路由，线上任务收件箱静默消失。
# CD 从**根本上**消除它：唯一部署入口 = 合并到 main 后从 main 部署，串行不取消，
# 不再存在"从谁的分支部署"的竞争。
#
# 关键顺序：**先 apply 迁移再部署 Worker**。新代码可能引用新表（如 #614 的 tasks），
# 表没建就部署 = 500。迁移是幂等的（0001/0002 都是 IF NOT EXISTS / migrations
# 框架自身按 applied 记录跳过），重复 apply 安全。
#
# 凭据：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（已在 repo secrets，devportal
# CD 同款）。wrangler --env staging 从 wrangler.toml 读 D1 绑定，不需要 .env.cloudflare。
name: deploy-coord-service

on:
  push:
    branches: [main]
    paths:
      - "packages/coord-service/**"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

concurrency:
  group: deploy-coord-service
  cancel-in-progress: false # 协调权威部署不允许中途取消（迁移+部署非原子），排队执行

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --filter @repo/coord-service...

      - name: Typecheck + test (gate before touching prod)
        working-directory: packages/coord-service
        run: |
          pnpm exec tsc --noEmit
          pnpm test

      - name: Apply D1 migrations (idempotent; must precede deploy)
        working-directory: packages/coord-service
        run: pnpm exec wrangler d1 migrations apply coord-service-staging --remote --env staging

      - name: Deploy Worker (from main only)
        working-directory: packages/coord-service
        run: pnpm exec wrangler deploy --env staging

      - name: Public smoke check (endpoints present + clock live)
        run: |
          base=https://coord-service-staging.boardx.workers.dev
          # /status 公开只读，必须 200
          s=$(curl -s -o /dev/null -w '%{http_code}' -m 20 "$base/status")
          echo "GET /status -> $s"
          [ "$s" = "200" ] || { echo "::error::status not 200 ($s)"; exit 1; }
          # /time 权威时钟（ADR-014），必须 200 且带 cycle.id——回归检测：
          # 若某次部署从缺 /time 的旧 checkout 出去，这里当场红（正是要防的漂移）
          t=$(curl -s -m 20 "$base/time")
          echo "GET /time -> $t"
          echo "$t" | grep -q '"cycle"' || { echo "::error::/time missing or malformed (deploy drift?)"; exit 1; }
          # /tasks 路由存在性——POST 无 token 应 401（有路由），而非 404（无路由）。
          # #290 的回归就是这里从 401 退成了 404（Worker 落后于 main）。
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 20 -X POST "$base/tasks" -H 'Content-Type: application/json' -d '{}')
          echo "POST /tasks (no token) -> $code"
          [ "$code" = "401" ] || { echo "::error::/tasks route missing (got $code, expected 401) — deploy drift"; exit 1; }
