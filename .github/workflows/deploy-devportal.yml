# deploy-devportal.yml — 协作平面 CD：main 上 apps/devportal 有新代码 → 自动部署
# develop.boardx.us（Cloudflare Pages 项目 devportal，#523 Track A）。
# 构建链 = next build → @cloudflare/next-on-pages → wrangler pages deploy。
# 凭据：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（Pages 权限即可）。
# 运行时 secrets（GITHUB_TOKEN/COORD_API_TOKEN/COORD_GATEWAY_ADMIN_TOKEN 等）在
# Pages 项目侧，与本流水线无关。
name: deploy-devportal

on:
  push:
    branches: [main]
    paths:
      - "apps/devportal/**"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

concurrency:
  group: deploy-devportal
  cancel-in-progress: true # 静态构建可安全取消，只保最新

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --filter @repo/devportal...

      - name: Build (next + next-on-pages)
        working-directory: apps/devportal
        run: |
          pnpm build
          pnpm exec next-on-pages

      - name: Deploy to Cloudflare Pages
        working-directory: apps/devportal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler pages deploy .vercel/output/static \
            --project-name devportal --branch main --commit-hash "${{ github.sha }}"

      - name: Public smoke check
        run: |
          # develop.boardx.us 应 302 到 Access 登录（门禁在前）；pages.dev 直连 API 应 401
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 20 https://develop.boardx.us/)
          echo "develop.boardx.us -> $code"
          [ "$code" = "302" ] || { echo "::error::expected 302 (Access), got $code"; exit 1; }
          api=$(curl -s -o /dev/null -w '%{http_code}' -m 20 "https://devportal-4mx.pages.dev/api/portal/pulse")
          echo "pages.dev API -> $api"
          [ "$api" = "401" ] || { echo "::error::expected 401 on direct pages.dev API, got $api"; exit 1; }
