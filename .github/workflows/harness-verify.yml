# harness-verify.yml — CI 门控
# 仓库即唯一事实来源：PR 必须通过基础验证 + harness verify 才能合并。
# 同时校验 subagent 生成物没有漂移（改了 yaml 却忘了重新生成 → 红）。

name: harness-verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 不指定 version：pnpm/action-setup 从 package.json 的 packageManager 字段
      # (pnpm@9.0.0) 读取。两处都写会触发 ERR_PNPM_BAD_PM_VERSION。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install + 基础验证 (init.sh)
        run: ./init.sh

      - name: Subagent 生成物未漂移
        run: |
          pnpm harness gen-subagents
          git diff --exit-code .claude/agents .codex/agents \
            || (echo "✗ subagent 生成物与 .harness/agents/*.yaml 不一致：改了 yaml 请重新跑 pnpm harness gen-subagents 并提交" && exit 1)

      # verify 需要 --phase 或 --sprint（裸调用会报缺少 --phase）。
      # 指向已交付的 sprint：已 passing 的 feature 会被跳过(不可逆)，
      # 其验收是文件检查、不依赖运行时服务，故 CI 可安全门控。
      # 新增 sprint 后，把这里更新/追加为对应的 --sprint NN/MM。
      - name: harness verify
        run: pnpm harness verify --sprint 01/01
