# harness-verify.yml — CI 门控
# 快速迭代策略（2026-07）：
#   - PR/push 只做轻量门控：受影响模块的 typecheck/lint/test（turbo --affected）+ 生成物漂移检查。
#   - 全栈烟测(fullstack-smoke)：每小时检查 main 是否有新合并的 PR，有才跑一次。
#   - 全量浏览器 e2e(e2e-full)：每 3 小时定时回归一次。
#   - harness verify / 完整验证由本地开发流程承担（pnpm harness verify、verify:full）。

name: harness-verify

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 每小时检查 main 是否有新合并（新 PR 落地即产生新 commit），有则跑全栈烟测。
    - cron: "0 * * * *"
    # 全量浏览器 e2e 每 3 小时跑一次。
    - cron: "30 */3 * * *"
  # 手动触发 e2e-full（#665）：它此前只在 `30 */3` 那个 cron 跑，改动它的人要等最多
  # 3 小时才知道结果，验证成本高到没人验证——这正是它连红 12 次无人察觉的一环。
  workflow_dispatch:
    inputs:
      run_e2e_full:
        description: "跑全量浏览器 e2e（e2e-full）"
        type: boolean
        default: true
      # #675 取证对照用：playwright 并发度降/升档（playwright.config.ts 里是 workers: 1，
      # CLI --workers 优先级更高）。schedule 触发时 inputs 为空，回落到 '1' 即现状。
      e2e_workers:
        description: "playwright --workers（#675 对照实验用，默认与 config 一致）"
        type: string
        default: "1"
      # #675 取证对照用：dev server 的 V8 老生代堆上限（MB）。ubuntu-latest 是 4c16G，
      # 默认给 ~75% = 12288。想对照“不加参数的原行为”就 dispatch 时填 0。
      e2e_node_heap_mb:
        description: "dev server --max-old-space-size（MB，0 = 不加该参数）"
        type: string
        default: "12288"

jobs:
  verify:
    # 轻量门控：每个 PR/push 都跑，只测受本次改动影响的模块；定时(daily)不重复跑。
    # 也排除 workflow_dispatch：dispatch 是专门用来手动跑 e2e-full 的，payload 里没有
    # `before` 字段 → TURBO_SCM_BASE 会解析成空串 → `turbo --affected` 基线为空。
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # --affected 需要能 diff 到 base 分支
          fetch-depth: 0

      # 不指定 version：pnpm/action-setup 从 package.json 的 packageManager 字段
      # (pnpm@9.0.0) 读取。两处都写会触发 ERR_PNPM_BAD_PM_VERSION。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Subagent 生成物未漂移
        run: |
          pnpm harness gen-subagents
          git diff --exit-code .claude/agents .codex/agents \
            || (echo "✗ subagent 生成物与 .harness/agents/*.yaml 不一致：改了 yaml 请重新跑 pnpm harness gen-subagents 并提交" && exit 1)

      # 只跑受本次改动影响的包（模块只测自己）。
      # PR：相对 base 分支；push main：相对上一个 commit。
      - name: 受影响模块 typecheck/lint/test
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
        run: pnpm turbo run typecheck lint test --affected

  # 每小时的门卫：看 main 在过去 1 小时内是否有新 commit（新 PR 合并即产生）。
  # 有 → 触发 fullstack-smoke；没有 → 本小时静默跳过，不浪费 runner。
  check-new-merges:
    if: github.event_name == 'schedule' && github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: main 过去 1 小时内是否有新 commit
        id: check
        run: |
          head_ts=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $((now - head_ts)) -lt 3600 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✓ main 有新合并（HEAD 距今 $((now - head_ts))s），触发全栈烟测"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "○ main 过去 1 小时无新合并，跳过"
          fi

  # 全栈运行时回归：pg/redis 服务 + curl 断言，真测运行时行为。
  # 不随每个 PR/push 跑；每小时定时检查，main 有新合并才执行。
  fullstack-smoke:
    needs: check-new-merges
    if: needs.check-new-merges.outputs.changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: boardx
          POSTGRES_PASSWORD: boardx
          POSTGRES_DB: boardx
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U boardx" --health-interval 3s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://boardx:boardx@localhost:5432/boardx
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate
        run: pnpm --filter @repo/data run migrate
      - name: Build web
        run: pnpm --filter @repo/web run build
      - name: 起服务 + 全栈烟测（F01/F02/F03）
        run: |
          set -euo pipefail
          pnpm --filter @repo/web start &
          pnpm --filter @repo/workflow-worker start &
          # 等 web 就绪
          for i in $(seq 1 30); do curl -sf localhost:3000/api/health >/dev/null && break; sleep 2; done
          # F01：健康 + 首页
          curl -sf localhost:3000/api/health | jq -e '.ok==true'
          curl -s localhost:3000 | grep -q BoardX
          # F02：notes 写读闭环
          curl -sf -X POST localhost:3000/api/notes -H 'content-type: application/json' -d '{"text":"ci-note"}' | jq -e '.note.text=="ci-note"'
          curl -sf localhost:3000/api/notes | jq -e '[.notes[].text] | index("ci-note") != null'
          # F03：入队 → worker → done（异步轮询，带超时）
          JID=$(curl -sf -X POST localhost:3000/api/jobs -H 'content-type: application/json' -d '{"payload":"ci"}' | jq -r '.id')
          ok=0; for i in $(seq 1 25); do curl -s localhost:3000/api/jobs/$JID | jq -e '.job.status=="done"' >/dev/null && { ok=1; break; }; sleep 1; done
          test "$ok" = "1" || { echo "✗ F03 job 未在超时内完成"; exit 1; }
          echo "✓ 全栈烟测通过（F01/F02/F03）"

  # 全量 Playwright e2e 回归（真浏览器，覆盖 auth/team/room/canvas/board 等全部模块）。
  # 较重，不随每个 PR/push 跑；每 3 小时定时执行一次（错开半小时，避开整点的烟测检查）。
  e2e-full:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 */3 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e_full)
    runs-on: ubuntu-latest
    # 止血用的硬上限（#665 / 根因见 #675）：最近 13 次 e2e-full 全部跑了 **328–345
    # 分钟**才失败（conclusion 均为 failure，从未真撞到 GitHub 的 6h 默认上限）——
    # 绝大部分时间是在对着第 8 分钟就死掉的 dev server 等超时。90 分钟纯粹是止血：
    # 把"默默烧 5.7 小时"压到"1.5 小时内失败且有人被叫醒"。
    #
    # ⚠️ 90 这个值**没有实测支撑**：本仓至今没有一次健康的全量绿跑，所以"正常耗时是
    # 多少"是未知数。它严格优于现状（现状 100% 在 ~340 分钟失败），但**根因（#675）
    # 修好、拿到第一次绿跑之后必须回来校准**——否则健康跑若真需要 95 分钟，这里会
    # 误杀并开假告警，而且因为被取消，你永远测不到真实耗时。
    timeout-minutes: 90
    # 失败时要开 issue 叫醒人类（见末尾步骤）——默认 GITHUB_TOKEN 只读，不显式声明
    # 告警会静默失败，等于没有告警。按最小权限只给这个 job（`sync-projection.yml`
    # 用的是 workflow 级顶层 permissions；这里用 job 级，权限内容相同但范围更窄）。
    permissions:
      issues: write
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: boardx
          POSTGRES_PASSWORD: boardx
          POSTGRES_DB: boardx
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U boardx" --health-interval 3s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://boardx:boardx@localhost:5432/boardx
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate
        run: pnpm --filter @repo/data run migrate
      - name: Install Playwright chromium
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium
      # kb/studio/presentation 的异步生成链路（入队→worker 消费→回写状态）依赖
      # workflow-worker 进程；不起它，相关 e2e（kb-001/presentations/studio）会稳定超时。
      #
      # #675 取证仪表（这一步只加观测与对照旋钮，不动测试本身，也不改成生产构建——
      # next build 的构建期 DCE 会剃光 e2e 测试后门，见 #666/#675）：
      #   1. NODE_OPTIONS --max-old-space-size：dev server 由 playwright webServer 起
      #      （`next dev`，env 是 `...process.env` 透传，见 apps/web/playwright.config.ts），
      #      所以 step 级 env 能到达 dev server 及其 static-paths-worker 子进程。
      #      若雪崩消失/推迟 → 内存假设成立。dispatch 传 0 可关闭，对照原行为。
      #   2. 内存采样：后台循环每 30s 把所有 node/next 进程的 RSS+etime+argv 和系统
      #      free -m 追加进 memlog.txt。dev server 的 PID 在 playwright 内部拿不到，
      #      所以不追单个 PID，改为每轮 ps 全量过滤——顺带能看到 static-paths-worker
      #      等子进程各自的占用，比单 PID 信息更全。
      #   3. --workers 降/升档参数化：区分「内存耗尽」vs「并发编译竞态」的第二轮对照。
      - name: Playwright e2e（全量：auth/team/room/canvas/profile/board + 各功能模块；webServer 自动起 next dev，先后台起 workflow-worker）
        env:
          E2E_WORKERS: ${{ inputs.e2e_workers || '1' }}
          E2E_NODE_HEAP_MB: ${{ inputs.e2e_node_heap_mb || '12288' }}
        run: |
          set -euo pipefail
          if [ "$E2E_NODE_HEAP_MB" != "0" ]; then
            export NODE_OPTIONS="--max-old-space-size=${E2E_NODE_HEAP_MB}"
            echo "○ NODE_OPTIONS=$NODE_OPTIONS（#675 内存对照开）"
          else
            echo "○ 未设置 NODE_OPTIONS（#675 对照组：原行为）"
          fi
          # RSS 采样循环（#675 取证）：memlog.txt 无论成败都随 artifact 上传。
          (
            while true; do
              {
                echo "=== $(date -u +%FT%TZ) ==="
                ps -eo pid,ppid,rss,etime,args --sort=-rss | awk 'NR==1 || /[n]ode|[n]ext/' | head -30
                free -m
              } >> memlog.txt
              sleep 30
            done
          ) &
          MEMLOG_PID=$!
          pnpm --filter @repo/workflow-worker start &
          pnpm --filter @repo/web exec playwright test --workers "$E2E_WORKERS"
          kill "$MEMLOG_PID" 2>/dev/null || true

      # #675 取证：内存采样与 playwright 现场无论成败都上传（绿跑的 memlog 同样有用——
      # 是校准 timeout-minutes 与内存基线的第一份健康样本）。
      - name: 上传 #675 诊断 artifact（memlog + playwright 现场）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-diagnostics-${{ github.run_id }}
          path: |
            memlog.txt
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 14

      # 拉停线绳（#665）：e2e-full 曾连红 12 次、每次烧 5.7h 而无人察觉——因为它只在
      # 定时任务跑、PR 上永远 skipping，没有任何人被叫醒。红了就必须有人知道：开一个
      # issue（同一根因只留一个，已存在则追加评论），而不是静静地红下去。
      - name: 全量回归失败 → 开 issue 叫醒人类
        # `|| cancelled()` 不可省：撞 timeout-minutes 时 job 是被**取消**而非 failure，
        # 只写 failure() 会让告警在"跑挂了 90 分钟"这个最该报的场景哑火。
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 显式给仓库上下文：不给的话 gh 靠 checkout 出来的 git remote 解析仓库，
          # 若 job 在 checkout 期间就被取消，gh 无上下文 → issue list/create 双双失败
          # → `|| true` 吞掉 → 告警静默丢失。一行 env 解耦。
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="🚨 e2e-full 全量回归失败"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number -q '.[0].number' || true)
          BODY=$(printf '%s\n' \
            "全量浏览器 e2e 回归失败。**这是唯一跑完整浏览器套件的门禁，PR 上不跑，红了只有本告警会说话。**" \
            "" \
            "- 运行：$RUN_URL" \
            "- commit：\`${{ github.sha }}\`" \
            "- 触发：\`${{ github.event_name }}\`" \
            "" \
            "**先查是不是已知根因 #675**：如果日志里有大量 \`Cannot find module './vendor-chunks/*.js'\` + \`Unexpected token '<', \\\"<!DOCTYPE\\\"\`，那就是 #675（next dev 的 static-paths-worker 在第 8 分钟起读不到 vendor chunk，此后所有碰 DB 的路由 500），**不是新问题、也不是 worker 的锅**，别退回给写代码的人。" \
            "" \
            "⚠️ **#675 明确排除了两条死路**：(1) 加 \`serverExternalPackages\` 是 no-op（\`pg\` 本就在 Next 14 默认外部化列表里）；(2) 改用 \`next build && next start\` 会被人类否决——生产构建的构建期 DCE 会剃光 e2e 测试后门（\`/api/dev/*\`、\`__canvasTestApi\`），而把后门改成 env 守门放进生产包**已被明确禁止**（\`grant-sysadmin\` 是一键提权）。动手前先读 #675。" \
            "" \
            "如果不是上述形态，再读失败日志归因到代码。" \
            "" \
            "> 注：本告警只在 job 真的跑到了这一步时才会发出。job 压根起不来（runner/billing 类基础设施故障）时它自己也不会跑——那种情况下这条 issue 不会存在，属于已知盲区。")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
