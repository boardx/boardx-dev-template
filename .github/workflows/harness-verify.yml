# harness-verify.yml — CI 门控
# 快速迭代策略（2026-07）：
#   - PR/push 只做轻量门控：受影响模块的 typecheck/lint/test（turbo --affected）+ 生成物漂移检查。
#   - 全栈烟测(fullstack-smoke)：每小时检查 main 是否有新合并的 PR，有才跑一次。
#   - 全量浏览器 e2e(e2e-full)：每 3 小时定时回归一次。
#   - harness verify / 完整验证由本地开发流程承担（pnpm harness verify、verify:full）。

name: harness-verify

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 每小时检查 main 是否有新合并（新 PR 落地即产生新 commit），有则跑全栈烟测。
    - cron: "0 * * * *"
    # 全量浏览器 e2e 每 3 小时跑一次。
    - cron: "30 */3 * * *"
  # 手动触发 e2e-full（#665）：它此前只在 `30 */3` 那个 cron 跑，改动它的人要等最多
  # 3 小时才知道结果，验证成本高到没人验证——这正是它连红 12 次无人察觉的一环。
  workflow_dispatch:
    inputs:
      run_e2e_full:
        description: "跑全量浏览器 e2e（e2e-full）"
        type: boolean
        default: true

jobs:
  verify:
    # 轻量门控：每个 PR/push 都跑，只测受本次改动影响的模块；定时(daily)不重复跑。
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # --affected 需要能 diff 到 base 分支
          fetch-depth: 0

      # 不指定 version：pnpm/action-setup 从 package.json 的 packageManager 字段
      # (pnpm@9.0.0) 读取。两处都写会触发 ERR_PNPM_BAD_PM_VERSION。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Subagent 生成物未漂移
        run: |
          pnpm harness gen-subagents
          git diff --exit-code .claude/agents .codex/agents \
            || (echo "✗ subagent 生成物与 .harness/agents/*.yaml 不一致：改了 yaml 请重新跑 pnpm harness gen-subagents 并提交" && exit 1)

      # 只跑受本次改动影响的包（模块只测自己）。
      # PR：相对 base 分支；push main：相对上一个 commit。
      - name: 受影响模块 typecheck/lint/test
        env:
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
        run: pnpm turbo run typecheck lint test --affected

  # 每小时的门卫：看 main 在过去 1 小时内是否有新 commit（新 PR 合并即产生）。
  # 有 → 触发 fullstack-smoke；没有 → 本小时静默跳过，不浪费 runner。
  check-new-merges:
    if: github.event_name == 'schedule' && github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: main 过去 1 小时内是否有新 commit
        id: check
        run: |
          head_ts=$(git log -1 --format=%ct)
          now=$(date +%s)
          if [ $((now - head_ts)) -lt 3600 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✓ main 有新合并（HEAD 距今 $((now - head_ts))s），触发全栈烟测"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "○ main 过去 1 小时无新合并，跳过"
          fi

  # 全栈运行时回归：pg/redis 服务 + curl 断言，真测运行时行为。
  # 不随每个 PR/push 跑；每小时定时检查，main 有新合并才执行。
  fullstack-smoke:
    needs: check-new-merges
    if: needs.check-new-merges.outputs.changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: boardx
          POSTGRES_PASSWORD: boardx
          POSTGRES_DB: boardx
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U boardx" --health-interval 3s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://boardx:boardx@localhost:5432/boardx
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate
        run: pnpm --filter @repo/data run migrate
      - name: Build web
        run: pnpm --filter @repo/web run build
      - name: 起服务 + 全栈烟测（F01/F02/F03）
        run: |
          set -euo pipefail
          pnpm --filter @repo/web start &
          pnpm --filter @repo/workflow-worker start &
          # 等 web 就绪
          for i in $(seq 1 30); do curl -sf localhost:3000/api/health >/dev/null && break; sleep 2; done
          # F01：健康 + 首页
          curl -sf localhost:3000/api/health | jq -e '.ok==true'
          curl -s localhost:3000 | grep -q BoardX
          # F02：notes 写读闭环
          curl -sf -X POST localhost:3000/api/notes -H 'content-type: application/json' -d '{"text":"ci-note"}' | jq -e '.note.text=="ci-note"'
          curl -sf localhost:3000/api/notes | jq -e '[.notes[].text] | index("ci-note") != null'
          # F03：入队 → worker → done（异步轮询，带超时）
          JID=$(curl -sf -X POST localhost:3000/api/jobs -H 'content-type: application/json' -d '{"payload":"ci"}' | jq -r '.id')
          ok=0; for i in $(seq 1 25); do curl -s localhost:3000/api/jobs/$JID | jq -e '.job.status=="done"' >/dev/null && { ok=1; break; }; sleep 1; done
          test "$ok" = "1" || { echo "✗ F03 job 未在超时内完成"; exit 1; }
          echo "✓ 全栈烟测通过（F01/F02/F03）"

  # 全量 Playwright e2e 回归（真浏览器，覆盖 auth/team/room/canvas/board 等全部模块）。
  # 较重，不随每个 PR/push 跑；每 3 小时定时执行一次（错开半小时，避开整点的烟测检查）。
  e2e-full:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 */3 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e_full)
    runs-on: ubuntu-latest
    # 失败时要开 issue 叫醒人类（见末尾步骤）——默认 GITHUB_TOKEN 只读，不显式声明
    # 告警会静默失败，等于没有告警。对齐 sync-projection.yml 的既有惯例，按最小权限
    # 只给这个 job。
    permissions:
      issues: write
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: boardx
          POSTGRES_PASSWORD: boardx
          POSTGRES_DB: boardx
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U boardx" --health-interval 3s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://boardx:boardx@localhost:5432/boardx
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node (read .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Migrate
        run: pnpm --filter @repo/data run migrate
      - name: Install Playwright chromium
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium
      # kb/studio/presentation 的异步生成链路（入队→worker 消费→回写状态）依赖
      # workflow-worker 进程；不起它，相关 e2e（kb-001/presentations/studio）会稳定超时。
      - name: Playwright e2e（全量：auth/team/room/canvas/profile/board + 各功能模块；CI 上 webServer 起生产构建 next build && next start，先后台起 workflow-worker）
        run: |
          set -euo pipefail
          pnpm --filter @repo/workflow-worker start &
          pnpm --filter @repo/web exec playwright test

      # 拉停线绳（#665）：e2e-full 曾连红 12 次、每次烧 5.7h 而无人察觉——因为它只在
      # 定时任务跑、PR 上永远 skipping，没有任何人被叫醒。红了就必须有人知道：开一个
      # issue（同一根因只留一个，已存在则追加评论），而不是静静地红下去。
      - name: 全量回归失败 → 开 issue 叫醒人类
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="🚨 e2e-full 全量回归失败"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number -q '.[0].number' || true)
          BODY=$(printf '%s\n' \
            "全量浏览器 e2e 回归失败。**这是唯一跑完整浏览器套件的门禁，PR 上不跑，红了只有本告警会说话。**" \
            "" \
            "- 运行：$RUN_URL" \
            "- commit：\`${{ github.sha }}\`" \
            "- 触发：\`${{ github.event_name }}\`" \
            "" \
            "先分诊再退回：job steps 为空 + 秒级失败 + annotation 含 billing/runner 字样 = 基础设施问题，升级人类；否则读失败日志归因到代码。" \
            "参见 #665（上一次连红 12 次的根因：next dev 的 static-paths-worker 读不到 vendor-chunks，已改为 CI 跑生产构建）。")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
