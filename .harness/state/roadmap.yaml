# roadmap.yaml — 所有阶段(phase=项目)的单一来源
# new-phase 脚本读写本文件;每个阶段会在 phases/ 下 scaffold 一个目录。
project: boardx-dev-template
phases:
  - id: "01"
    slug: foundation
    name: Foundation
    goal: "搭好 monorepo 骨架、harness 控制平面与基础验证回路"
    status: in_progress
    depends_on: []
  - id: "02"
    slug: agent-runtime
    name: Agent Runtime
    goal: "实现 orchestrator + agent-core 的最小推理回路"
    status: not_started
    depends_on: ["01"]
  - id: "03"
    slug: fullstack-skeleton
    name: fullstack-skeleton
    goal: "用 web/data/workflow 三个小 feature 验证 harness 流程在全栈代码库上端到端可行且有质量"
    status: not_started
    depends_on: []
  - id: "04"
    slug: identity-and-spaces
    name: identity-and-spaces
    goal: "用户身份与协作空间：auth / identity / team / room"
    status: not_started
    depends_on: []
