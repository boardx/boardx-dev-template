# roadmap.yaml — 所有阶段(phase=项目)的单一来源
# 逻辑分阶段与依赖见 phases/ROADMAP.md（从真实需求 phases/requirements 推导，168 用例/22 模块）。
#
# 编号约定（2026-06-30 起）：物理 phase id 用 "pN" 前缀直接对齐 ROADMAP 的 P 阶段，
# 目录名 = phase-<id>-<slug>。两个例外保留旧物理号、不改名（避免动已 passing 的 CI 绿态）：
#   - id "01" foundation：harness 控制平面元层，非产品 P 阶段。
#   - id "04" identity-and-spaces：auth/team/room 核心打包体（= P1/P3/P4 核心），已 passing，未拆。
# phase-05-canvas 的便签 item CRUD 本质是画布素材 → 已并入 P6（目录改名为 phase-p6-canvas）。
#
# ⚠ 逻辑 P 阶段 ↔ 物理 phase 映射（物理 id 非 1:1 对应 P 阶段，看 PROGRESS 表前先读这里）：
#   元层   → 01 foundation
#   P0     → p0
#   P1     → 04(auth 核心) + p1(profile/common 补全)      ← P1 跨两个物理 phase
#   P2     → p2
#   P3     → 04(team 核心)                                 ← 无独立 p3
#   P4     → 04(room 核心) + p4(room-chat 补全)            ← P4 跨两个物理 phase
#   P5..P15 → p5..p15（1:1）
# 即：物理 "04" 是 auth/team/room 三件核心的打包体（横跨 P1/P3/P4），pN 多为对应 P 的「补全/扩展」。
#
# p16/p17：不对应 ROADMAP.md 的某个 P 阶段，是横切的 UI 对齐工作（导航接线/差距审计/
# reskin），2026-07-03 因"已 passing 功能与 prototype 差距很大"的复盘而开。
# new-phase 脚本读写本文件;每个阶段会在 phases/ 下 scaffold 一个目录。
project: boardx-dev-template
phases:
  - id: "01"
    slug: foundation
    name: Foundation（harness 元层）
    goal: "harness 控制平面与基础验证回路（元层，非产品功能）"
    status: in_progress
    depends_on: []
  - id: "p0"
    slug: fullstack-skeleton
    name: 基础设施 (P0)
    goal: "全栈基础设施：web/data/queue/worker/infra（CAP-WEB/DATA/WORKFLOW）"
    status: done
    depends_on: ["01"]
  - id: "04"
    slug: identity-and-spaces
    name: Auth/Team/Room 核心打包体（横跨 P1auth + P3team + P4room）
    goal: "账号身份+协作空间核心：auth/team核心/room核心。高级入口在对应能力阶段渐进点亮（见 ROADMAP.md）"
    status: in_progress
    depends_on: ["p0"]
  - id: "p1"
    slug: profile-common
    name: Profile/Common（P1 补全，配合 04 的 auth）
    goal: "个人资料/用户菜单/个人 Memory + 全局搜索/语言/主题/反馈"
    status: done
    depends_on: ["04"]
  - id: "p2"
    slug: home
    name: Home 工作台 (P2)
    goal: "首页工作台：欢迎区(用户/团队名)/Recent/Agent 搜索骨架/推荐功能入口/Onboarding。AVA 相关动作 blocked-on p9"
    status: in_progress
    depends_on: ["04"]
  - id: "p4"
    slug: room-chat
    name: Room-Chat (P4 补全)
    goal: "房间内聊天：创建/列表打开/发消息/删除（room 核心在 phase-04；room 文件/Studio/Survey 入口在能力阶段点亮）"
    status: in_progress
    depends_on: ["04"]
  - id: "p5"
    slug: board
    name: Board 基础 (P5)
    goal: "Board 生命周期：创建/打开/列表搜索最近/收藏/改元数据/复制/移动/删除 + 可见性 access（board 容器，非画布编辑）"
    status: done
    depends_on: ["04"]
  - id: "p6"
    slug: canvas
    name: Canvas & 组件 (P6)
    goal: "白板画布编辑核心：canvas(平移缩放/选择/对齐/撤销重做) + widgets(便签/形状/文本/连接线/图片/图表…) + widget-menu。含 phase-05 便签 item 命令运行时作为种子"
    status: in_progress
    depends_on: ["p5"]
  - id: "p7"
    slug: board-shell
    name: Board 壳 (P7)
    goal: "Board UI 壳：header(标题/分享/计时器/导出…) + board-menu(各组件创建入口) + context-menu(层级/分组/锁定) + local-workspace"
    status: in_progress
    depends_on: ["p6"]
  - id: "p8"
    slug: collaboration
    name: 实时协作 (P8)
    goal: "多人实时协作：board/collaboration(Yjs 同步) + 在线状态/光标/跟随（CAP-COLLAB，Yjs+Redis fanout）"
    status: not_started
    depends_on: ["p6"]
  - id: "p9"
    slug: ava-chat
    name: AVA / Chat (P9)
    goal: "AVA 对话：线程/消息/Deep Research/附件/语音/建议动作 + 公开分享（CAP-AI）"
    status: in_progress
    depends_on: ["04"]
  - id: "p10"
    slug: knowledge-base
    name: 知识库 (P10)
    goal: "个人/Team 知识库：上传/列表下载/删除/在 AI 上下文引用（CAP-FILE+AI）"
    status: in_progress
    depends_on: ["p9"]
  - id: "p11"
    slug: ai-store
    name: AI Store (P11)
    goal: "AI Store：浏览/创建维护/订阅使用/收藏/共享/审核精选（Team→平台审核流）"
    status: in_progress
    depends_on: ["p9"]
  - id: "p12"
    slug: studio-presentations
    name: Studio & 演示 (P12)
    goal: "Studio 生成 Artifact + 演示文稿生成与修订（AI+FILE）"
    status: in_progress
    depends_on: ["p6", "p9"]
  - id: "p13"
    slug: survey
    name: 问卷 (P13)
    goal: "问卷：创建/管理/答题/报告/模板/发布下线（Respondent=访客）"
    status: in_progress
    depends_on: ["04"]
  - id: "p14"
    slug: credits-billing
    name: 积分 & 计费 (P14)
    goal: "钱包/购买积分/积分记录 + 升级计划/扫码支付（Payment）"
    status: in_progress
    depends_on: ["04"]
  - id: "p15"
    slug: admin
    name: Admin 后台 (P15)
    goal: "后台管理：首页/用户/Team/AI Store 审核与精选（SysAdmin 横切）"
    status: in_progress
    depends_on: ["p11"]
  - id: "p16"
    slug: ui-nav-alignment
    name: UI 导航接线与差距审计
    goal: "把已 passing 但无导航入口的功能(Ava/Surveys/Admin)接入产品导航；对 Ava/Store/Surveys/Admin 做 UI 差距审计产出权威 gap 表；design lint 覆盖扩大到新增页面"
    status: not_started
    depends_on: ["p2", "p9", "p11", "p13", "p15"]
  - id: "p17"
    slug: ui-reskin-round2
    name: UI Reskin Round 2
    goal: "对齐 prototype 的第二轮 reskin：Board AI 浮层/底部工具dock/board chat、Ava、AI Store、Admin、Surveys、Knowledge Base+Credits 收尾。按 ADR-003 需先过 UI 先行确认关卡"
    status: not_started
    depends_on: ["p16", "p6", "p7", "p9", "p10", "p11", "p13", "p14", "p15"]
    has_ui: true
