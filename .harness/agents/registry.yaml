# registry.yaml — 参与开发的 Agent 花名册（多 agent 协调的身份来源）
# 见 ADR-004（协调总线）与 .harness/instructions/multi-agent-coordination.md（流程）。
#
# 用途：
#  - id 是 agent 的唯一身份，投影为 issue 的 `agent:<id>` label，也用作 claim 的 --owner。
#  - kind 决定角色：coordinator（总协调，唯一，独占合并权）/ module-coordinator（模块二级
#    协调，分派+初审+返工裁决，无合并权）/ architecture-coordinator（控制平面/协议本身的
#    迭代者，同样无合并权）/ worker（写码）/ reviewer（评审）。
#  - reviewer 复用 .harness/agents/*.yaml 已定义的 subagent（agent: 字段指向其名）。
#  - required_for：该 reviewer 对哪些 area 是**强制**门禁（coordinator 据此路由 review）。
#  - active：注销（retire/deactivate）状态位，默认 true。改成 false 表示该身份已停用，
#    不参与新的分派/认领；不删除条目本身（保留 areas/kind 等历史信息）。改这个字段和
#    新增/删除条目一样是控制平面变更，走正常 PR + review（见 agent-onboarding-checklist.md）。
version: 1

agents:
  # ── 主 Agent：编排者（唯一）────────────────────────────────────────────────
  - id: coord-main
    active: true
    owner: usam.shen@gmail.com
    kind: coordinator
    model: opus-4.8
    responsibilities:
      - 读 issue 总线，按 wave + parallel_safe + area 不相交分派给空闲 worker
      - 监视 status:* 流转；PR 开启后编排必需 reviewer
      - review 全绿 + CI 绿 + 分支 up-to-date → 合并 main、置 status:merged、关 issue
      - 回收 stale 认领（lease 超时）、升级 blocked

  # ── Architecture Coordinator（控制平面本身的迭代者；非产品模块）────────────
  # 职责：harness 控制平面、协议文档（AGENTS.md/.harness/instructions/*/ADR）、
  # agent 身份/协作协议的持续迭代——目标是让任何 agent（含未来的第三方/开源社区 agent、
  # 非 Claude 平台 agent）都能靠读文档 + 走 issue/label 总线无缝接入协作，不依赖
  # Claude Code 私有机制。同样无独立合并权，控制平面改动全绿后转交 coord-main。
  - id: coord-architecture
    active: true
    owner: usam.shen@gmail.com
    kind: architecture-coordinator
    model: opus-4.8
    areas: [harness, docs, adr, agent-protocol]
    reports_to: coord-main

  # ── 模块 Coordinator（二级编排；分派+初审，无独立合并权）───────────────────
  # 架构（2026-07-04 起）：coord-main（唯一合并权）↔ N 个 module-coordinator（各领域分派/初审）。
  # module-coordinator 职责：读自己 areas 范围内的 issue，分派给该模块的 worker，
  # 调起首轮 reviewer 做初审，返工裁决；PR 全绿后**转交 coord-main 做最终合并**
  # （不可自行 merge——避免跨模块热点文件的合并冲突失去唯一把关人）。
  - id: coord-room
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [room, room-files, room-survey, room-chat, invite, share]
    reports_to: coord-main
  - id: coord-board
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [canvas, board, board-header, board-menu, context-menu, widgets, studio, presentations]
    reports_to: coord-main
  - id: coord-collab
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [collaboration]
    reports_to: coord-main
  - id: coord-ava
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [ai-core, deep-research, voice, ai-settings, attachments, message-actions, knowledge-base]
    reports_to: coord-main
  - id: coord-store-admin
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [ai-store, admin]
    reports_to: coord-main
  - id: coord-survey
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [survey]
    reports_to: coord-main
  - id: coord-platform
    active: true
    owner: usam.shen@gmail.com
    kind: module-coordinator
    model: opus-4.8
    areas: [auth, team, home-page, profile, common, billing, credits]
    reports_to: coord-main

  # ── Worker：写码 agent（1 agent = 1 owner，可增删）──────────────────────────
