# github-sync.yaml — 文件 → GitHub 单向映射规则(GitHub 只读投影)
version: 1

repo: "boardx/boardx-dev-template"   # owner/name

direction: one-way              # 单向:文件是事实来源,GitHub 是投影

mapping:
  phase:   milestone            # 阶段 → Milestone
  sprint:  label                # sprint → label(sprint:NN-MM)
  feature: issue                # feature → Issue

# 只对"当前/近期"的 sprint 开 Issue,避免一次开数百个
issue_policy:
  open_for: near_term           # near_term | all（创建已幂等；all 在大清单上较慢，逐 feature 查询）
  near_term_window: 2           # near_term 模式：当前 + 往后 N 个 sprint

labels:
  blocked: "status:blocked"     # 规范化：统一到 status:* 状态机（ADR-004）
  passing: "status:merged"      # feature.passing ⇔ label status:merged（ADR-004 §3）
  area_prefix: "area:"          # 用 feature.area 生成 area:<area> 标签

# 状态 → GitHub 动作（label 对齐 multi-agent-coordination.md §1 的规范 status:* 集合）
status_actions:
  passing:     { close_issue: true, add_label: "status:merged" }
  blocked:     { add_label: "status:blocked" }
  in_progress: { add_label: "status:in-progress" }
  not_started: { }
